services:
  meeting_postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meeting_trans}
      POSTGRES_USER: ${POSTGRES_USER:-meeting_trans}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeting_trans}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meeting_trans}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lawyer-crm_default

  meeting_redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lawyer-crm_default

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    environment:
      - APP_ENV=production
      - POSTGRES_HOST=meeting_postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-meeting_trans}
      - POSTGRES_USER=${POSTGRES_USER:-meeting_trans}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-meeting_trans}
      - REDIS_URL=redis://meeting_redis:6379/0
      - LIVEKIT_HOST=meet-npvekn8u.livekit.cloud
      - LIVEKIT_PORT=443
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_WS_URL=wss://meet-npvekn8u.livekit.cloud
      - LIVEKIT_PUBLIC_WS_URL=wss://meet-npvekn8u.livekit.cloud
      - PUBLIC_WEB_URL=https://meet.109.123.230.159.nip.io
      - MEETING_MAX_DURATION_MINUTES=60
      - MEETING_EXPIRY_SWEEP_SECONDS=15
      - CAPTION_WORKER_SERVICE_TOKEN=${CAPTION_WORKER_SERVICE_TOKEN:-change-me-worker-service-token}
      - CORS_ORIGINS=https://meet.109.123.230.159.nip.io
      - SEED_ENGLISH_EMAIL=${SEED_ENGLISH_EMAIL:-english@meetingtest.com}
      - SEED_THAI_EMAIL=${SEED_THAI_EMAIL:-thai@meetingtest.com}
      - SEED_ENGLISH_PASSWORD=${SEED_ENGLISH_PASSWORD}
      - SEED_THAI_PASSWORD=${SEED_THAI_PASSWORD}
    depends_on:
      meeting_postgres:
        condition: service_healthy
      meeting_redis:
        condition: service_healthy
    networks:
      lawyer-crm_default:
        aliases:
          - meeting-live-trans-api

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://meeting_redis:6379/0
      - LIVEKIT_URL=wss://meet-npvekn8u.livekit.cloud
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - API_URL=http://meeting-live-trans-api:8000
      - CAPTION_API_URL=http://meeting-live-trans-api:8000
      - CAPTION_WORKER_SERVICE_TOKEN=${CAPTION_WORKER_SERVICE_TOKEN:-change-me-worker-service-token}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-change-me}
      - TRANSLATION_PROVIDER=${TRANSLATION_PROVIDER:-openai-hybrid}
      - OPENAI_REALTIME_TRANSLATE_SOURCE_LANGUAGES=${OPENAI_REALTIME_TRANSLATE_SOURCE_LANGUAGES:-en}
      - OPENAI_REALTIME_TRANSLATE_MODEL=${OPENAI_REALTIME_TRANSLATE_MODEL:-gpt-realtime-translate}
      - OPENAI_REALTIME_TRANSCRIBE_MODEL=${OPENAI_REALTIME_TRANSCRIBE_MODEL:-gpt-realtime-whisper}
      - OPENAI_TRANSLATION_MODEL=${OPENAI_TRANSLATION_MODEL:-gpt-4o-mini}
      - OPENAI_TRANSCRIPTION_DELAY=${OPENAI_TRANSCRIPTION_DELAY:-low}
      - OPENAI_TRANSCRIPTION_SILENCE_COMMIT_MS=${OPENAI_TRANSCRIPTION_SILENCE_COMMIT_MS:-500}
      - OPENAI_TRANSLATE_FINAL_SILENCE_MS=${OPENAI_TRANSLATE_FINAL_SILENCE_MS:-700}
      - OPENAI_TRANSLATE_OUTPUT_IDLE_MS=${OPENAI_TRANSLATE_OUTPUT_IDLE_MS:-1500}
      - OPENAI_TRANSLATE_LATE_REVISION_MS=${OPENAI_TRANSLATE_LATE_REVISION_MS:-10000}
      - TRANSLATION_PARTIAL_DEBOUNCE_MS=${TRANSLATION_PARTIAL_DEBOUNCE_MS:-150}
      - TRANSLATION_PARTIAL_MIN_CHARS=${TRANSLATION_PARTIAL_MIN_CHARS:-8}
    depends_on:
      meeting_redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - lawyer-crm_default

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        - NEXT_PUBLIC_API_URL=https://api.meet.109.123.230.159.nip.io
        - NEXT_PUBLIC_LIVEKIT_WS_URL=wss://meet-npvekn8u.livekit.cloud
    environment:
      - NEXT_PUBLIC_LIVEKIT_WS_URL=wss://meet-npvekn8u.livekit.cloud
      - NEXT_PUBLIC_API_URL=https://api.meet.109.123.230.159.nip.io
    networks:
      - lawyer-crm_default

volumes:
  postgres_data:

networks:
  lawyer-crm_default:
    external: true
