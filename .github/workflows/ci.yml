# CI/CD Pipeline (MTG-061)
# Pull Request → lint → type check → unit tests → build → deploy staging
# Main branch → migration → deploy production → health check → rollback on failure

name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web, translation-worker]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        if: matrix.service == 'api' || matrix.service == 'translation-worker'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        if: matrix.service == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint (API)
        if: matrix.service == 'api'
        run: |
          pip install ruff
          cd apps/api && ruff check .

      - name: Type Check (API)
        if: matrix.service == 'api'
        run: |
          pip install mypy
          cd apps/api && mypy app/ --ignore-missing-imports

      - name: Unit Tests (API)
        if: matrix.service == 'api'
        run: |
          cd apps/api
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
          python -m pytest tests/ -v

      - name: Lint & Type Check (Web)
        if: matrix.service == 'web'
        run: |
          cd apps/web && npm ci && npm run lint && npx tsc --noEmit

      - name: Lint (Translation Worker)
        if: matrix.service == 'translation-worker'
        run: |
          pip install ruff
          cd apps/translation-worker && ruff check .

      - name: Unit Tests (Translation Worker)
        if: matrix.service == 'translation-worker'
        run: |
          cd apps/translation-worker
          pip install -e .
          pip install pytest pytest-asyncio
          python -m pytest ../api/tests/ -v -k "reliability or security or captions" --ignore-glob="*integration*"

  build-containers:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infrastructure/docker/Dockerfile.api -t $REGISTRY/$IMAGE_NAME-api:${{ github.sha }} .

      - name: Build Worker image
        run: docker build -f infrastructure/docker/Dockerfile.worker -t $REGISTRY/$IMAGE_NAME-worker:${{ github.sha }} .

      - name: Build Web image
        run: docker build -f infrastructure/docker/Dockerfile.web -t $REGISTRY/$IMAGE_NAME-web:${{ github.sha }} .

  security-scan:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for exposed secrets
        run: |
          if grep -r "sk-" --include="*.py" --include="*.ts" --include="*.tsx" apps/; then
            echo "WARNING: Potential API keys found in source"
          fi

  deploy:
    needs: build-containers
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy placeholder
        run: echo "Deploy to staging environment"
